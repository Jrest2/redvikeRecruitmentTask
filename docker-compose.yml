services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - PRISMA_URL=${PRISMA_URL}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - redvike-network
    volumes:
      - ./wait-for-it.sh:/wait-for-it.sh
    command: >
      sh -c "
        chmod +x /wait-for-it.sh &&
        /wait-for-it.sh postgres:5432 -- \
        npx prisma migrate deploy && \
        npx prisma generate --sql && \
        npm run build && \
        npm run start:dev
      "
  postgres:
    image: postgres:15
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - PGTZ=GMT
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    networks:
      - redvike-network
volumes:
  postgres_data:
    driver: local
networks:
  redvike-network:
